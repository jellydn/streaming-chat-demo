name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format (oxfmt)
        run: npm run format:check

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build
