name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format (oxfmt)
        run: bun run format:check

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Build
        run: bun run build
